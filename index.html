<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoCode</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            height: 90vh;
            max-height: 800px;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 12px 12px 0 0;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }
        
        .header p {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        
        .input-section {
            flex: 1;
            padding: 30px;
            border-right: 1px solid #eee;
            display: flex;
            flex-direction: column;
        }
        
        .output-section {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            background: #f9f9f9;
        }
        
        .input-group {
            display: flex;
            flex-direction: column;
            flex: 1;
        }
        
        .input-group label {
            font-weight: 600;
            margin-bottom: 10px;
            color: #333;
        }
        
        textarea {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            resize: none;
            transition: border-color 0.3s;
        }
        
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-clear {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn-clear:hover {
            background: #e0e0e0;
        }
        
        .output-item {
            margin-bottom: 25px;
            padding: 15px;
            background: white;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        
        .output-label {
            font-weight: 600;
            color: #667eea;
            margin-bottom: 8px;
            font-size: 12px;
            text-transform: uppercase;
        }
        
        .output-content {
            background: #f5f5f5;
            padding: 12px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 200px;
            overflow-y: auto;
            color: #333;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error {
            color: #e74c3c;
            padding: 15px;
            background: #fadbd8;
            border-radius: 6px;
            border-left: 4px solid #e74c3c;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 AutoCode</h1>
            <p>Generate and execute Python code with AI</p>
        </div>
        
        <div class="content">
            <div class="input-section">
                <div class="input-group">
                    <label for="prompt">Your Task</label>
                    <textarea id="prompt" placeholder="e.g., 'print 2+2' or 'print sum of [1,2,3,4,5]'"></textarea>
                </div>
                <div class="button-group">
                    <button class="btn-submit" onclick="submitPrompt()">Send</button>
                    <button class="btn-clear" onclick="clearAll()">Clear</button>
                </div>
            </div>
            
            <div class="output-section" id="output">
                <p style="color: #999; text-align: center; padding-top: 40px;">Results will appear here...</p>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000/chat';
        
        async function submitPrompt() {
            const prompt = document.getElementById('prompt').value.trim();
            
            if (!prompt) {
                showError('Please enter a task!');
                return;
            }
            
            const btn = event.target;
            btn.disabled = true;
            btn.textContent = 'Loading...';
            
            showLoading();
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        message: prompt,
                        history: []
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                displayResults(data);
                
            } catch (error) {
                showError(`Error: ${error.message}`);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Send';
            }
        }
        
        function displayResults(data) {
            const output = document.getElementById('output');
            output.innerHTML = '';
            
            // AI Response
            if (data.llm_response) {
                output.innerHTML += `
                    <div class="output-item">
                        <div class="output-label">AI Response</div>
                        <div class="output-content">${escapeHtml(data.llm_response)}</div>
                    </div>
                `;
            }
            
            // Generated Code
            if (data.code) {
                output.innerHTML += `
                    <div class="output-item">
                        <div class="output-label">Generated Code</div>
                        <div class="output-content">${escapeHtml(data.code)}</div>
                    </div>
                `;
            }
            
            // Execution Result
            if (data.execution) {
                if (data.execution.stdout) {
                    output.innerHTML += `
                        <div class="output-item">
                            <div class="output-label">Execution Result</div>
                            <div class="output-content">${escapeHtml(data.execution.stdout)}</div>
                        </div>
                    `;
                }
                
                if (data.execution.stderr) {
                    output.innerHTML += `
                        <div class="output-item" style="border-left-color: #e74c3c;">
                            <div class="output-label" style="color: #e74c3c;">Error</div>
                            <div class="output-content">${escapeHtml(data.execution.stderr)}</div>
                        </div>
                    `;
                }
            }
            
            // Interpretation
            if (data.interpretation) {
                output.innerHTML += `
                    <div class="output-item">
                        <div class="output-label">Interpretation</div>
                        <div class="output-content">${escapeHtml(data.interpretation)}</div>
                    </div>
                `;
            }
        }
        
        function showLoading() {
            document.getElementById('output').innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Processing your request...</p>
                </div>
            `;
        }
        
        function showError(message) {
            document.getElementById('output').innerHTML = `<div class="error">${message}</div>`;
        }
        
        function clearAll() {
            document.getElementById('prompt').value = '';
            document.getElementById('output').innerHTML = '<p style="color: #999; text-align: center; padding-top: 40px;">Results will appear here...</p>';
        }
        
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }
    </script>
</body>
</html>
